<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Meet The CEO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Connect CSS -->
    <link rel="stylesheet" href="register.css">
</head>
<body>


<!-- HEADER -->
<header class="header">

    <nav class="navbar">

        <div class="logo">
            <img src="mtc-logo.png" alt="Meet The CEO Logo">
        </div>

        <ul class="nav-links">

            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Event</a></li>
            <li><a href="ceos.html">CEOs</a></li>
            <li><a href="schedule.html">Schedule</a></li>
            <li><a href="register.html" class="active">Register</a></li>
            <li><a href="contact.html">Contact</a></li>

        </ul>

    </nav>

</header>


<!-- HERO -->
<section class="register-hero">

    <h1>Register Now</h1>

    <p>Secure your spot at Meet The CEO</p>

</section>


<!-- REGISTER FORM -->
<section class="register-section">

    <div class="register-container">

        <form class="register-form">

            <h2>Event Registration</h2>


            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your full name" required>
            </div>


            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email" required>
            </div>


            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" placeholder="Enter your phone number" required>
            </div>


            <div class="form-group">
                <label>Company / Organization</label>
                <input type="text" placeholder="Enter company name">
            </div>


            <div class="form-group">
                <label>Position</label>
                <input type="text" placeholder="Enter your position">
            </div>


            <div class="form-group">
                <label>Select Attendance Type</label>
                <select required>

                    <option value="">Select option</option>
                    <option>General Attendee</option>
                    <option>VIP Attendee</option>
                    <option>Speaker</option>
                    <option>Partner</option>

                </select>
            </div>


            <button type="submit" class="register-btn">
                Complete Registration
            </button>


        </form>

    </div>

</section>


<!-- FOOTER -->
<footer>

    <h3>Meet The CEO</h3>

    <p>© 2026 Meet The CEO. All rights reserved.</p>

</footer>


</body>
</html>
